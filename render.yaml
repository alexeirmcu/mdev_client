services:
  - type: web
    name: stp-pinger
    env: node
    region: oregon
    plan: free
    rootDir: pinger
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: STP_SERVER_URL
        fromService:
          name: stp-server
          type: web
          property: host

  - type: web
    name: stp-server
    env: node
    region: oregon
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: PINGER_URL
        fromService:
          name: stp-pinger
          type: web
          property: host

  - type: web
    name: stp-client
    env: static
    buildCommand: cd client && npm install && npm run build
    staticPublishPath: client/dist
