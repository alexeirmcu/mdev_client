services:
  - type: web
    name: stp-pinger
    env: node
    region: oregon
    plan: free
    rootDir: pinger
    buildCommand: npm install
    startCommand: node server.js

  - type: web
    name: stp-server
    env: node
    region: oregon
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health

  - type: web
    name: stp-client
    env: static
    buildCommand: cd client && npm install && npm run build
    staticPublishPath: client/dist
